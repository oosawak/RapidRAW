<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oekaki Chat Pages</title>
    <meta
      name="description"
      content="GitHub Pages 上で確認する、お絵かきチャットと RapidRAW の入口ページ。"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="backdrop backdrop-a"></div>
    <div class="backdrop backdrop-b"></div>

    <div class="app-shell hub-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">OC</div>
          <div>
            <p class="eyebrow">GitHub Pages</p>
            <h1>Preview Hub</h1>
          </div>
        </div>

        <div class="topbar-status">
          <span class="status-pill">Two previews</span>
          <span class="muted">demo と RapidRAW の両方をここから確認します</span>
        </div>

        <div class="topbar-actions">
          <button class="button button-ghost" type="button" data-hub-nav="demo">Open Demo</button>
          <button class="button button-ghost" type="button" data-hub-nav="rapidraw">Open RapidRAW</button>
        </div>
      </header>

      <main class="hub-grid">
        <section class="card hub-intro">
          <div class="card-head">
            <h2>Choose a view</h2>
            <span class="chip">Pages only</span>
          </div>
          <p class="card-copy">
            ここから、今作っている確認用画面と RapidRAW 風のプレビューを切り替えられます。
            どちらも GitHub Pages で見られるようにしています。
          </p>

          <div class="hub-launches">
            <button class="hub-launch-card is-active" type="button" data-preview-src="./demo.html" data-label="Demo" data-copy="コラボ描画の確認用画面。キャンバスとストロークフィードを見られます。">
              <span class="hub-card-kicker">Preview</span>
              <strong>Demo</strong>
              <span class="hub-card-copy">確認用画面を開く</span>
            </button>
            <button class="hub-launch-card" type="button" data-preview-src="./rapidraw.html" data-label="RapidRAW" data-copy="RapidRAW 風の写真編集プレビュー。調整 UI と PNG 書き出しを確認できます。">
              <span class="hub-card-kicker">Preview</span>
              <strong>RapidRAW</strong>
              <span class="hub-card-copy">写真編集の見た目を開く</span>
            </button>
          </div>

          <div class="hub-note">
            <strong>Note</strong>
            <span id="hubNote">最初は Demo を表示しています。右のプレビュー枠で切り替わります。</span>
          </div>
        </section>

        <section class="card hub-preview">
          <div class="card-head">
            <h2 id="previewTitle">Demo</h2>
            <span class="chip" id="previewChip">./demo.html</span>
          </div>
          <div class="preview-frame-wrap">
            <iframe id="previewFrame" title="Preview" src="./demo.html"></iframe>
            <div class="preview-fallback" id="previewFallback">
              <strong>Preview target</strong>
              <span>表示されない場合はボタンから別タブで開いてください。</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./hub.js"></script>
  </body>
</html>
